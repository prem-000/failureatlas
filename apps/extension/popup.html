<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FailureAtlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="brand">
        <svg class="logo" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g id="praxis-group">
            <g id="praxis-stroke-group" stroke="currentColor" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
              <path id="praxis-stroke-top" d="M80 60H140" />
              <path id="praxis-stroke-curve" d="M140 60C167.614 60 190 82.3858 190 110C190 137.614 167.614 160 140 160" />
              <path id="praxis-stroke-mid" d="M140 160H110" />
              <path id="praxis-stroke-vertical" d="M110 160V200" />
              <path id="praxis-stroke-bottom" d="M110 160L80 160" stroke-linejoin="miter" />
            </g>
            <g id="praxis-ring-group" fill="currentColor" fill-opacity="0.2">
              <circle id="praxis-ring" cx="140" cy="110" r="25" />
            </g>
            <g id="praxis-core-group" fill="currentColor">
              <circle id="praxis-core" cx="140" cy="110" r="4" />
            </g>
          </g>
        </svg>
        <span class="brand-name">FailureAtlas</span>
      </div>
      <div class="status-indicator">
        <span id="statusDot" class="status-dot disconnected"></span>
        <span id="statusText" class="status-text">Offline</span>
      </div>
    </header>

    <main id="view-container">
      <!-- Dynamic views (login, dashboard, settings) will be rendered here -->
    </main>
  </div>
</body>
</html>

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Fail the entire workflow fast if any job fails
defaults:
  run:
    shell: bash

jobs:
  # ── Job 1: Validate the app (type-check + Next.js build) ──────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm (latest)
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type-check (app + extension)
        run: pnpm type-check

      - name: Build Next.js application
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "ci-secret-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
        run: pnpm build

  # ── Job 2: Build & push Docker image (only after build job passes) ─────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: premmdb/failureatlas
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max